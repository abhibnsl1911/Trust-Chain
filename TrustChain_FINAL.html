function Ring({score, size}) {
  size = size || 96;
  const ref = useRef();
  const anim = useRef(0);
  const col = score >= 70 ? "#00E5A0" : score >= 40 ? "#FFB300" : "#FF2D55";
  useEffect(() => {
    const c = ref.current;
    if (!c) return;
    c.width = size * 2; c.height = size * 2;
    const ctx = c.getContext("2d");
    ctx.scale(2, 2);
    const cx = size / 2, cy = size / 2, r = size / 2 - 7;
    let cur = 0;
    cancelAnimationFrame(anim.current);
    const draw = () => {
      cur = Math.min(cur + 2, score);
      ctx.clearRect(0, 0, size, size);
      ctx.beginPath(); ctx.arc(cx, cy, r, -Math.PI / 2, 1.5 * Math.PI);
      ctx.strokeStyle = "rgba(255,255,255,.06)"; ctx.lineWidth = 7; ctx.stroke();
      if (cur > 0) {
        const end = -Math.PI / 2 + (cur / 100) * 2 * Math.PI;
        ctx.beginPath(); ctx.arc(cx, cy, r, -Math.PI / 2, end);
        ctx.strokeStyle = col; ctx.lineWidth = 7; ctx.lineCap = "round"; ctx.stroke();
        ctx.shadowColor = col; ctx.shadowBlur = 10;
        ctx.beginPath(); ctx.arc(cx, cy, r, -Math.PI / 2, end);
        ctx.strokeStyle = col + "44"; ctx.lineWidth = 11; ctx.stroke();
        ctx.shadowBlur = 0;
      }
      if (cur < score) anim.current = requestAnimationFrame(draw);
    };
    anim.current = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(anim.current);
  }, [score, size, col]);
  return e("canvas", {ref, style: {position:"absolute",inset:0,width:"100%",height:"100%"}});
}

      c.width = W * 2; c.height = H * 2;
      const ctx = c.getContext("2d"); ctx.scale(2, 2); ctx.clearRect(0, 0, W, H);

      gr.addColorStop(0, "rgba(255,45,85,.2)"); gr.addColorStop(1, "rgba(255,45,85,0)");
      ctx.beginPath();

      ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath(); ctx.fillStyle = gr; ctx.fill();
      ctx.beginPath();
      d.forEach((v, i) => { const x = (i / (d.length - 1)) * W, y = H - (v / max) * H; i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
      ctx.strokeStyle = "#FF2D55"; ctx.lineWidth = 1.5; ctx.stroke();

function IdGraph({center, linked}) {
  const W = 500, H = 240, cx = W / 2, cy = H / 2;
  const nodes = [{u:center,x:cx,y:cy,main:true}, ...linked.map((u, i) => {
    const a = (i / linked.length) * 2 * Math.PI - Math.PI / 2;
    return {u, x: cx + 92 * Math.cos(a), y: cy + 92 * Math.sin(a), main: false};
  })];
  const [hov, setHov] = useState(null);
  return e("svg", {viewBox: "0 0 " + W + " " + H, style: {width:"100%",height:H}},
    e("defs", null,
      e("filter", {id: "gf"},
        e("feGaussianBlur", {stdDeviation: "2", result: "b"}),
        e("feMerge", null, e("feMergeNode", {in: "b"}), e("feMergeNode", {in: "SourceGraphic"}))
      )
    ),
    ...linked.map((lu, i) => {
      const n = nodes[i + 1];
      const reasons = [];
      if (lu.imei === center.imei) reasons.push("IMEI");
      if (lu.bank === center.bank) reasons.push("Bank");
      if (lu.upi === center.upi) reasons.push("UPI");
      if (lu.ip.split(".").slice(0, 3).join(".") === center.ip.split(".").slice(0, 3).join(".")) reasons.push("IP");
      return e(Fragment, {key: i},
        e("line", {x1:cx,y1:cy,x2:n.x,y2:n.y,stroke:"rgba(255,45,85,.18)",strokeWidth:"1.5",strokeDasharray:"5,4"}),
        e("text", {x:(cx+n.x)/2,y:(cy+n.y)/2-5,fontSize:"8",fill:"rgba(255,45,85,.6)",textAnchor:"middle",fontFamily:"Fira Code"}, reasons.join("+"))
      );
    }),
    ...nodes.map((nd, i) => {
      const col = nd.u.score < 40 ? "#FF2D55" : nd.u.score < 70 ? "#FFB300" : "#00E5A0";
      const sz = nd.main ? 22 : 17;
      return e("g", {key: i, style: {cursor:"pointer"}, onMouseEnter: () => setHov(i), onMouseLeave: () => setHov(null)},
        e("circle", {cx:nd.x,cy:nd.y,r:sz+4,fill:col+"0A",stroke:col,strokeWidth:"0.5"}),
        e("circle", {cx:nd.x,cy:nd.y,r:sz,fill:col+"22",stroke:col,strokeWidth:nd.main?"2":"1.5",filter:hov===i?"url(#gf)":undefined}),
        e("text", {x:nd.x,y:nd.y+1,fontSize:nd.main?"10":"8.5",fill:col,textAnchor:"middle",dominantBaseline:"middle",fontWeight:"700",fontFamily:"Fira Code"}, nd.u.init),
        e("text", {x:nd.x,y:nd.y+sz+12,fontSize:"9",fill:"#8BA3C7",textAnchor:"middle",fontFamily:"Fira Code"}, nd.u.name.split(" ")[0])
